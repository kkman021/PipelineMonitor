name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        shell: bash
        run: |
          dotnet publish src/AzureSummary.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:WarningLevel=0 \
            -o publish/${{ matrix.rid }}

      - name: Rename artifact
        shell: bash
        run: |
          src="publish/${{ matrix.rid }}/azmon"
          if [ -f "${src}.exe" ]; then
            mv "${src}.exe" "${src}-${{ matrix.rid }}.exe"
          else
            mv "${src}" "${src}-${{ matrix.rid }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: azmon-${{ matrix.rid }}
          path: publish/${{ matrix.rid }}/azmon-${{ matrix.rid }}*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: azmon ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: artifacts/*
